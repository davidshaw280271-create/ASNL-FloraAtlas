<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AONB Atlas - Password Protected</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }
        .password-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        input[type="password"] {
            padding: 0.8rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #5a67d8;
        }
        .error {
            color: #e74c3c;
            margin-top: 1rem;
            font-weight: bold;
        }
        .info {
            color: #666;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>AONB Atlas</h1>
        <form class="password-form" onsubmit="checkPassword(event)">
            <input type="password" id="passwordInput" placeholder="Enter password" required>
            <button type="submit">Access Atlas</button>
            <div id="errorMessage" class="error"></div>
            <div class="info">Temporary password protection for GitHub upload</div>
        </form>
    </div>

    <script>
        function checkPassword(event) {
            event.preventDefault();
            
            const password = document.getElementById('passwordInput').value;
            const errorMessage = document.getElementById('errorMessage');
            
            // Temporary password for GitHub upload
            if (password === 'Dave123') {
                // Store access in session
                sessionStorage.setItem('atlasAccess', 'granted');
                // Redirect to main site
                window.location.href = 'index.html';
            } else {
                errorMessage.textContent = 'Incorrect password. Please try again.';
                errorMessage.style.display = 'block';
                
                // Clear error after 3 seconds
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 3000);
            }
        }
        
        // Check if user already has access
        window.addEventListener('load', function() {
            if (sessionStorage.getItem('atlasAccess') === 'granted') {
                window.location.href = 'index.html';
            }
        });
        
        // Allow Enter key to submit
        document.getElementById('passwordInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                checkPassword(event);
            }
        });
    </script>
</body>
</html>
