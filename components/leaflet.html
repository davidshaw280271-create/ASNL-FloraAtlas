<section id="leafletViewer" style="display: flex; flex-direction: column;">

  <!-- Species Information Container -->
  <div id="species-info" style="margin: 0 0 0 0; padding: 3px 12px; background-color: #000000; border: 1px solid #ddd; border-radius: 4px; width: 100%; height: 20px;">
    <div id="species-info-content" style="font-size: 20px; line-height: 1.0; color: #ffffff;">
      Select a species to view information
    </div>
  </div>

  <!-- Main Content Container (flex layout) -->
  <div style="display: flex; flex-direction: row; gap: 20px;">

    <div id="controls">

    <!-- Species Search -->
    <div class="control search-control">
      <input type="text" id="speciesSearch" placeholder="Search species..." style="width: 180px; padding: 4px; font-size: 12px; border: 1px solid #ccc; border-radius: 3px;">
    </div>

    <!-- Dropdown -->
    <div class="control dropdown-control">
      <select id="latinSelect">
        <option value="">-- Select a species --</option>
      </select>
    </div>

    <!-- Apply button -->
    <div class="control apply-control">
      <button id="applyBtn">Apply</button>
    </div>

    <!-- Year bins header -->
    <div class="control bins-header" style="margin-top: 15px; margin-bottom: 5px;">
      <div style="display: flex; justify-content: space-between; padding: 0 2px;">
        <span style="font-weight: bold; font-size: 12px; color: #333; margin-left: 40px;">Year</span>
        <span style="font-weight: bold; font-size: 12px; color: #333; margin-right: 12px;">Unique Squares</span>
      </div>
    </div>

    <!-- Year bins -->
    <div class="control bins-control">
      <div><input type="checkbox" value="All Years" checked><span class="bin bin-all" style="background-color: white; border: 1px solid #ccc;">All Years</span></div>
      <div><input type="checkbox" value="2020+"><span class="bin bin-20plus">2020+</span></div>
      <div><input type="checkbox" value="<2020"><span class="bin bin-pre2020" style="background-color: white; border: 1px solid #ccc;">&lt;2020</span></div>
      <div><input type="checkbox" value="2000-2019"><span class="bin bin-00-19">2000–2019</span></div>
      <div><input type="checkbox" value="1987-1999"><span class="bin bin-87-99">1987–1999</span></div>
      <div><input type="checkbox" value="1970-1986"><span class="bin bin-70-86">1970–1986</span></div>
      <div><input type="checkbox" value="1930-1969"><span class="bin bin-30-69">1930–1969</span></div>
      <div><input type="checkbox" value="<1930"><span class="bin bin-1930">&lt;1930</span></div>
    </div>

    <!-- Grid sizes header -->
    <div class="control grids-header" style="margin-top: 15px; margin-bottom: 5px;">
      <div style="display: flex; justify-content: flex-start; padding: 0 2px;">
        <span style="font-weight: bold; font-size: 12px; color: #333; margin-left: 25px;">Recording Unit</span>
      </div>
    </div>

    <!-- Grid sizes -->
    <div class="control grids-control" style="margin-top: 5px;">
      <div><input type="checkbox" value="grid"><span>Grid</span></div>
      <div><input type="checkbox" value="hectad"><span>Hectad</span></div>
      <div><input type="checkbox" value="tetrad"><span>Tetrad</span></div>
      <div><input type="checkbox" value="monad"><span>Monad</span></div>
    </div>

    <!-- Phenology Chart -->
    <div id="phenology-chart" style="margin-top: 5px; padding: 10px;">
      <div id="phenology-svg" style="width: 187px; height: 135px;"></div>
    </div>

    <div id="prepost-summary" style="margin-top:8px; font-size:14px;"></div>

    <!-- Atlas Summary -->
    <div id="atlasSummary" style="margin-top:10px; font-size:14px; display: none;">
      <table id="summaryTable">
        <thead>
          <tr>
            <th>Years</th>
            <th></th>
            <th>Unique Squares</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </div>

  <div id="map"></div>

  <div style="display: flex; gap: 20px; flex: 1;">
    <div id="photos" style="flex: 1;">
      <div class="viewer"></div>
      <div class="thumbnails"></div>

      <div class="photo-controls">
        <button id="toggleThumbs">
          <span></span><span></span>
          <span></span><span></span>
        </button>

        <button id="fullscreenBtn" title="Enter Fullscreen">
          <svg viewBox="0 0 24 24">
            <path d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zm6 10v6h-6v-2h4v-4h2zm-10 6H4v-6h2v4h4v2z" />
          </svg>
        </button>

        <button id="prevBtn" title="Previous">&#9664;</button>
        <button id="nextBtn" title="Next">&#9654;</button>
      </div>
    </div>

    <div id="records">
      <div id="records-content"></div>
    </div>
  </div>

  <!-- Close Main Content Container -->
  </div>

</section>
