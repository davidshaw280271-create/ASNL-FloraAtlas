  <!-- ===== Component Loader (Step 2) ===== -->

  <script>

  document.addEventListener("DOMContentLoaded", () => {

    const includes = document.querySelectorAll("[include-html]");

    let remaining = includes.length;



    includes.forEach(el => {

      const file = el.getAttribute("include-html");

      fetch(file)

        .then(resp => resp.text())

        .then(html => {

          el.innerHTML = html;

          remaining--;



          // When ALL components are loaded, run JS initialisers

          if (remaining === 0) {

            // console.log("All components loaded — running initialisers");



            // Initialize page display

            if (typeof showLeafletPage === "function") showLeafletPage();



            // Add navigation click handlers

            const navLinks = document.querySelectorAll('nav a');

            navLinks[0].addEventListener('click', showLeafletPage);

            navLinks[1].addEventListener('click', showD3Page);

            navLinks[2].addEventListener('click', showPhotosPage);

            navLinks[3].addEventListener('click', showStatisticsPage);



            if (typeof initShared === "function") initShared();

            if (typeof initLeaflet === "function") initLeaflet();

            if (typeof initD3 === "function") initD3();

            if (typeof initPhotos === "function") initPhotos();

            // Add event listeners with proper cleanup
            setTimeout(() => {
              // Remove all existing listeners first
              const latinSelect = document.getElementById("latinSelect");
              if (latinSelect) {
                const newLatinSelect = latinSelect.cloneNode(true);
                latinSelect.parentNode.replaceChild(newLatinSelect, latinSelect);
                
                newLatinSelect.addEventListener("change", () => {
                  // console.log("Species selected - updating everything including photos and summary table");
                  const speciesName = newLatinSelect.value;
                  
                  // Update species info container
                  const speciesInfoContent = document.getElementById("species-info-content");
                  if (speciesInfoContent) {
                    if (speciesName && speciesName !== "Select") {
                      // Get English name from metadata
                      const metadata = metadataLookup.get(speciesName);
                      const englishName = metadata ? metadata.english : '';
                      
                      // Display both Latin and English names
                      if (englishName) {
                        speciesInfoContent.innerHTML = `<strong>${speciesName}</strong> - ${englishName}`;
                      } else {
                        speciesInfoContent.innerHTML = `<strong>${speciesName}</strong>`;
                      }
                    } else {
                      speciesInfoContent.innerHTML = "Select a species to view information";
                    }
                  }
                  
                  // Clear summary table before updating to prevent duplicates
                  const summaryBody = document.querySelector("#summaryTable tbody");
                  if (summaryBody) summaryBody.innerHTML = "";
                  
                  // Update everything when species is selected
                  updateCarousel(speciesName);  // Update photos
                  drawFiltered();              // Update records
                  drawD3Atlas(speciesName);     // Update D3 atlas
                  if (window.drawPhenologyChart) {
                    window.drawPhenologyChart(speciesName); // Update phenology chart
                  }
                  const activeGrids = getCheckedValues(".grids-control");
                  drawGridOverlay(activeGrids); // Update grid overlay
                  
                  // Trigger zoom-to-extents button after species change
                  setTimeout(() => {
                    // console.log("Triggering zoom-to-extents after species change");
                    // Find and click the zoom-to-extents button
                    const zoomButtons = document.querySelectorAll('.leaflet-control-zoom-in');
                    zoomButtons.forEach(btn => {
                      if (btn.title === 'Fit to data' || btn.innerHTML.includes('rect')) {
                        // console.log("Found zoom-to-extents button, clicking it");
                        btn.click();
                      }
                    });
                  }, 500); // Wait for map to update
                  
                  // Apply black borders to summary table after updates
                  setTimeout(() => {
                    const summaryTable = document.querySelector("#summaryTable");
                    if (summaryTable) {
                      summaryTable.style.border = "2px solid #000";
                      summaryTable.style.borderCollapse = "collapse";
                      summaryTable.style.borderSpacing = "0";
                      
                      const cells = summaryTable.querySelectorAll("th, td");
                      cells.forEach(cell => {
                        cell.style.border = "1px solid #000";
                        cell.style.padding = "8px 12px";
                      });
                    }
                  }, 200);
                });
                // console.log("Dynamic species listener added");
              }

              // Add dynamic checkbox listeners (maps and records only, no photos or summary table)
              document.querySelectorAll(".bins-control input[type=checkbox], .grids-control input[type=checkbox]").forEach(box => {
                const newBox = box.cloneNode(true);
                box.parentNode.replaceChild(newBox, box);
                
                newBox.addEventListener("click", () => {
                  // console.log("Checkbox toggled:", box.value, "- updating maps and records only");
                  // Update only the maps and filtered records, not photos, D3 atlas, or summary table
                  updateMap();
                  drawFiltered();
                  // Don't update carousel, D3 atlas, or summary table
                });
              });

              // console.log("Dynamic checkbox listeners added - maps and records only, no photos, D3 atlas, or summary table");
            }, 1500);

          }

        })

        .catch(err => {

          el.innerHTML = "<p style='color:red;'>Failed to load " + file + "</p>";

          // console.error("Include error:", file, err);

        });

    });

  });

  </script>

<!-- ===== Initialization calls ===== -->
<script>
  // Global metadata lookup for English names
  window.metadataLookup = new Map();
  
  // Load metadata for English names
  fetch('metadata.csv')
    .then(response => response.text())
    .then(csvText => {
      // Use Papa Parse for proper CSV parsing with commas
      Papa.parse(csvText, {
        header: true,
        complete: function(results) {
          results.data.forEach(row => {
            metadataLookup.set(row.species, row);
          });
          // console.log('Metadata loaded for English names:', metadataLookup.size, 'entries');
        },
        error: function(error) {
          // console.error('CSV parsing error:', error);
        }
      });
    })
    .catch(err => /* console.error('Failed to load metadata:', err) */ {});
